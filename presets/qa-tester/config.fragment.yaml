# General-Config fragment for the QA Tester preset.
# Only whitelisted, role-defining keys (OQ-2, CEO-confirmed). Merge/patch fragment only.
agent:
  max_turns: 35
  reasoning_effort: medium
  disabled_toolsets: []
toolsets:
  - file
  - terminal
  - web
delegation:
  enabled: false
kanban:
  default_assignee: qa-tester
approvals:
  mode: auto
