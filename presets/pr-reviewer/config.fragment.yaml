# General-Config fragment for the PR Reviewer preset.
# Only whitelisted, role-defining keys (OQ-2, CEO-confirmed). Merge/patch fragment only.
agent:
  max_turns: 25
  reasoning_effort: high
  disabled_toolsets: []
toolsets:
  - file
  - terminal
  - web
delegation:
  enabled: false
kanban:
  default_assignee: pr-reviewer
approvals:
  mode: auto
